<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 书签管理系统</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .login-header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    
    .login-header p {
      color: #6b7280;
      font-size: 14px;
    }
    
    .login-form {
      margin-bottom: 24px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 8px;
    }
    
    .form-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      transition: all 0.2s ease;
      outline: none;
    }
    
    .form-input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .btn-login {
      width: 100%;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-login:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    
    .test-account-box {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border-radius: 12px;
      padding: 20px;
      margin-top: 24px;
    }
    
    .test-account-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #92400e;
      margin-bottom: 12px;
    }
    
    .test-account-item {
      background: white;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    
    .test-account-item:last-child {
      margin-bottom: 0;
    }
    
    .test-account-role {
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    
    .test-account-role.admin {
      color: #7c3aed;
    }
    
    .test-account-role.user {
      color: #059669;
    }
    
    .test-account-credentials {
      font-size: 13px;
      color: #374151;
      font-family: 'Consolas', 'Monaco', monospace;
    }
    
    .error-message {
      background-color: #fee2e2;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .input-group {
      position: relative;
    }
    
    .input-group .form-input {
      padding-right: 48px;
    }
    
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #6b7280;
      padding: 4px;
    }
    
    .toggle-password:hover {
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🔖 书签管理系统</h1>
      <p>请登录您的账户以继续</p>
    </div>
    
    <div class="error-message" id="errorMessage"></div>
    
    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label class="form-label" for="username">用户名</label>
        <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <div class="input-group">
          <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required>
          <button type="button" class="toggle-password" id="togglePassword" title="显示/隐藏密码">
            👁️
          </button>
        </div>
      </div>
      
      <button type="submit" class="btn-login" id="loginBtn">
        <span>登录</span>
      </button>
    </form>
    
    <div class="test-account-box">
      <div class="test-account-title">
        <span>🔑</span>
        <span>测试账号</span>
      </div>
      
      <div class="test-account-item">
        <div class="test-account-role admin">管理员 (Admin)</div>
        <div class="test-account-credentials">
          用户名: <strong>admin</strong> | 密码: <strong>admin123</strong>
        </div>
      </div>
      
      <div class="test-account-item">
        <div class="test-account-role user">普通用户 (User)</div>
        <div class="test-account-credentials">
          用户名: <strong>user</strong> | 密码: <strong>user123</strong>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      AppState.init();
      
      if (AppState.isLoggedIn()) {
        window.location.href = '/documents.html';
        return;
      }
      
      const loginForm = document.getElementById('loginForm');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const errorMessage = document.getElementById('errorMessage');
      const togglePassword = document.getElementById('togglePassword');
      
      togglePassword.addEventListener('click', function() {
        const type = passwordInput.type === 'password' ? 'text' : 'password';
        passwordInput.type = type;
        togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
      });
      
      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.classList.add('show');
      }
      
      function hideError() {
        errorMessage.classList.remove('show');
      }
      
      function setLoading(loading) {
        if (loading) {
          loginBtn.disabled = true;
          loginBtn.innerHTML = '<span class="spinner"></span><span>登录中...</span>';
        } else {
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<span>登录</span>';
        }
      }
      
      loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        hideError();
        
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        
        if (!username) {
          showError('请输入用户名');
          usernameInput.focus();
          return;
        }
        
        if (!password) {
          showError('请输入密码');
          passwordInput.focus();
          return;
        }
        
        setLoading(true);
        
        try {
          const result = await apiRequest('/api/auth/login', {
            method: 'POST',
            body: { username, password }
          });
          
          if (result.data && result.data.success) {
            AppState.setAuth(result.data.token, result.data.user);
            showToast('登录成功！', 'success');
            setTimeout(() => {
              window.location.href = '/documents.html';
            }, 500);
          } else {
            showError(result.data?.message || '登录失败，请检查用户名和密码');
          }
        } catch (error) {
          showError('网络错误，请稍后重试');
          console.error('登录错误:', error);
        } finally {
          setLoading(false);
        }
      });
      
      usernameInput.focus();
    });
  </script>
</body>
</html>
