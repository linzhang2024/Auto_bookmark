<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>同步历史记录 - 书签管理系统</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .history-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stat-item {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
    }
    
    .stat-item.blue { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .stat-item.green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
    .stat-item.red { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
    .stat-item.orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .stat-label {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .history-item {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
      transition: all 0.3s ease;
    }
    
    .history-item:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    
    .history-summary {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
    }
    
    .history-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .history-icon.completed { background: #d1fae5; }
    .history-icon.partial { background: #fef3c7; }
    .history-icon.failed { background: #fee2e2; }
    
    .history-info {
      flex: 1;
      min-width: 0;
    }
    
    .history-title {
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .history-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    
    .history-badge.completed { background: #d1fae5; color: #065f46; }
    .history-badge.partial { background: #fef3c7; color: #92400e; }
    .history-badge.failed { background: #fee2e2; color: #991b1b; }
    
    .history-meta {
      font-size: 12px;
      color: #6b7280;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    
    .history-stats-bar {
      display: flex;
      gap: 24px;
      align-items: center;
    }
    
    .stat-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
    }
    
    .stat-badge.success { color: #10b981; }
    .stat-badge.failed { color: #ef4444; }
    
    .expand-icon {
      font-size: 20px;
      color: #9ca3af;
      transition: transform 0.3s ease;
    }
    
    .history-item.expanded .expand-icon {
      transform: rotate(180deg);
    }
    
    .history-detail {
      display: none;
      border-top: 1px solid #f3f4f6;
      padding: 16px 20px;
      background: #fafbfc;
    }
    
    .history-item.expanded .history-detail {
      display: block;
    }
    
    .detail-section {
      margin-bottom: 20px;
    }
    
    .detail-section:last-child {
      margin-bottom: 0;
    }
    
    .detail-title {
      font-weight: 600;
      color: #374151;
      margin-bottom: 12px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .failures-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .failure-item {
      background: white;
      border-left: 4px solid #ef4444;
      border-radius: 0 8px 8px 0;
      padding: 12px 16px;
    }
    
    .failure-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    
    .failure-title {
      font-weight: 500;
      color: #1f2937;
      font-size: 14px;
    }
    
    .failure-type {
      background: #fee2e2;
      color: #991b1b;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    
    .failure-url {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 8px;
      word-break: break-all;
    }
    
    .failure-folder {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 8px;
    }
    
    .failure-desc {
      background: #fef2f2;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      color: #991b1b;
      line-height: 1.5;
    }
    
    .no-failures {
      text-align: center;
      padding: 24px;
      color: #6b7280;
      font-size: 14px;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    
    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    
    .empty-state-text {
      font-size: 16px;
      color: #6b7280;
      margin-bottom: 8px;
    }
    
    .empty-state-hint {
      font-size: 14px;
      color: #9ca3af;
    }
    
    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }
    
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .summary-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: white;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
    
    .summary-label {
      color: #6b7280;
      font-size: 13px;
    }
    
    .summary-value {
      font-weight: 600;
      color: #1f2937;
      font-size: 14px;
    }
    
    .error-type-card {
      background: white;
      border-radius: 8px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      margin-bottom: 8px;
    }
    
    .error-type-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .error-type-name {
      font-weight: 600;
      color: #ef4444;
    }
    
    .error-type-count {
      background: #fee2e2;
      color: #991b1b;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .error-type-desc {
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
    }
    
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .retry-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .retry-btn.primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .retry-btn.primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .retry-btn-small {
      padding: 4px 8px;
      font-size: 11px;
    }
    
    .retry-progress {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      z-index: 10000;
      max-width: 400px;
    }
    
    .retry-progress h4 {
      margin: 0 0 12px 0;
      font-size: 14px;
      color: #1f2937;
    }
    
    .retry-progress .progress-container {
      margin-bottom: 8px;
    }
    
    .retry-progress .progress-text {
      margin: 0;
      font-size: 12px;
      color: #6b7280;
    }
    
    .backup-info-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      color: white;
    }
    
    .backup-info-card h4 {
      margin: 0 0 8px 0;
      font-size: 14px;
      font-weight: 600;
    }
    
    .backup-info-card .backup-dir {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.15);
      padding: 8px 12px;
      border-radius: 6px;
      font-family: monospace;
      word-break: break-all;
    }
    
    .backup-info-card .backup-dir-icon {
      font-size: 16px;
    }
    
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
    }
    
    .download-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
    }
    
    .download-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .download-btn-small {
      padding: 4px 8px;
      font-size: 11px;
    }
    
    .no-backup-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: #f3f4f6;
      border-radius: 4px;
      font-size: 11px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="history-header">
      <div>
        <h1>📊 同步历史记录</h1>
        <p style="color: #6b7280; margin-top: 4px; font-size: 14px;">查看所有书签同步的历史记录和详细统计</p>
      </div>
      <div style="display: flex; gap: 12px;">
        <button class="btn btn-secondary refresh-btn" id="refreshBtn">
          <span>🔄</span>
          <span>刷新</span>
        </button>
      </div>
    </div>
    
    <div id="backupInfoCard"></div>
    
    <div id="statsContainer" class="history-stats"></div>
    
    <div id="errorDistribution" style="display: none; margin-bottom: 24px;">
      <h3 style="margin-bottom: 12px; color: #374151; font-size: 16px;">错误类型分布</h3>
      <div id="errorTypeList"></div>
    </div>
    
    <div id="historyContainer">
      <div class="loading">⏳ 加载中...</div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      checkAuth();
      renderNav();
      
      const statsContainer = document.getElementById('statsContainer');
      const historyContainer = document.getElementById('historyContainer');
      const errorDistribution = document.getElementById('errorDistribution');
      const errorTypeList = document.getElementById('errorTypeList');
      const backupInfoCard = document.getElementById('backupInfoCard');
      const refreshBtn = document.getElementById('refreshBtn');
      
      let expandedIds = new Set();
      let ws = null;
      let isRetrying = false;
      let retryProgressEl = null;
      
      async function loadBackupConfig() {
        try {
          const result = await apiRequest('/api/backups/config', { method: 'GET' });
          
          if (result.data && result.data.success) {
            const data = result.data.data;
            backupInfoCard.innerHTML = `
              <div class="backup-info-card">
                <h4>📁 备份文件存储目录</h4>
                <div class="backup-dir">
                  <span class="backup-dir-icon">📂</span>
                  <span>${escapeHtml(data.backupDir)}</span>
                </div>
              </div>
            `;
          }
        } catch (error) {
          console.error('加载备份配置失败:', error);
        }
      }
      
      function downloadBackup(id) {
        window.location.href = `/api/sync-history/${id}/download`;
        showToast('开始下载备份文件...', 'info');
      }
      
      function connectWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}`;
        
        try {
          ws = new WebSocket(wsUrl);
          
          ws.onopen = function() {
            console.log('WebSocket 连接已建立');
          };
          
          ws.onmessage = function(event) {
            try {
              const data = JSON.parse(event.data);
              handleWebSocketMessage(data);
            } catch (e) {
              console.error('解析 WebSocket 消息失败:', e);
            }
          };
          
          ws.onclose = function() {
            console.log('WebSocket 连接已关闭');
            setTimeout(connectWebSocket, 5000);
          };
          
          ws.onerror = function(error) {
            console.error('WebSocket 错误:', error);
          };
        } catch (e) {
          console.error('建立 WebSocket 连接失败:', e);
        }
      }
      
      function handleWebSocketMessage(data) {
        if (!data.type) return;
        
        switch (data.type) {
          case 'retry_started':
            if (data.data) {
              showRetryProgress(data.data.taskId, data.data.totalToRetry);
            }
            break;
            
          case 'retry_progress':
            if (data.data && retryProgressEl) {
              updateRetryProgress(
                data.data.current,
                data.data.total,
                data.data.message
              );
            }
            break;
            
          case 'retry_completed':
            if (data.data) {
              hideRetryProgress();
              const result = data.data.result;
              const successCount = result.newSuccessCount || 0;
              const failedCount = result.stillFailedCount || 0;
              
              if (successCount > 0) {
                showToast(`重试成功：${successCount} 个书签已修复`, 'success');
              }
              if (failedCount > 0) {
                showToast(`仍有 ${failedCount} 个书签重试失败`, 'warning');
              }
              if (successCount === 0 && failedCount === 0) {
                showToast('重试完成', 'info');
              }
              
              loadStats();
              loadHistory();
            }
            break;
            
          case 'retry_failed':
            hideRetryProgress();
            showToast('重试任务失败: ' + (data.data?.error || '未知错误'), 'error');
            break;
            
          case 'unified_stats':
            if (data.data) {
              loadStats();
            }
            break;
        }
      }
      
      function showRetryProgress(taskId, totalToRetry) {
        isRetrying = true;
        
        if (retryProgressEl) {
          retryProgressEl.remove();
        }
        
        retryProgressEl = document.createElement('div');
        retryProgressEl.className = 'retry-progress';
        retryProgressEl.innerHTML = `
          <h4>🔄 正在重试失败的书签...</h4>
          <div class="progress-container">
            <div class="progress-bar" style="width: 0%;"></div>
          </div>
          <p class="progress-text">准备中 (0/${totalToRetry})</p>
        `;
        document.body.appendChild(retryProgressEl);
      }
      
      function updateRetryProgress(current, total, message) {
        if (!retryProgressEl) return;
        
        const progress = total > 0 ? Math.round((current / total) * 100) : 0;
        const progressBar = retryProgressEl.querySelector('.progress-bar');
        const progressText = retryProgressEl.querySelector('.progress-text');
        
        if (progressBar) {
          progressBar.style.width = `${progress}%`;
        }
        if (progressText) {
          progressText.textContent = `${message || '处理中'} (${current}/${total})`;
        }
      }
      
      function hideRetryProgress() {
        isRetrying = false;
        if (retryProgressEl) {
          retryProgressEl.remove();
          retryProgressEl = null;
        }
      }
      
      async function retryBatch(sync_id) {
        if (isRetrying) {
          showToast('已有重试任务进行中', 'warning');
          return;
        }
        
        try {
          const result = await apiRequest('/api/sync-history/retry-batch', {
            method: 'POST',
            body: { sync_id }
          });
          
          if (result.data && result.data.success) {
            showToast('重试任务已启动', 'info');
          } else {
            showToast(result.data?.message || '启动重试失败', 'error');
          }
        } catch (error) {
          showToast('启动重试失败: ' + error.message, 'error');
        }
      }
      
      async function loadStats() {
        try {
          const result = await apiRequest('/api/stats', { method: 'GET' });
          
          if (result.data && result.data.success) {
            const unifiedStats = result.data.data;
            const historyStats = unifiedStats.history;
            const currentStats = unifiedStats.current;
            const errorDist = historyStats.errorDistribution;
            
            let historyStatsHtml = '';
            
            if (historyStats.totalSyncs > 0) {
              historyStatsHtml = `
                <div class="stats-section">
                  <div class="stats-section-header">
                    <h3>📈 历史累计统计</h3>
                    <span class="stats-hint">数据为所有同步批次的累计值</span>
                  </div>
                  <div class="history-stats">
                    <div class="stat-item blue">
                      <div class="stat-value">${historyStats.totalSyncs}</div>
                      <div class="stat-label">累计同步次数</div>
                    </div>
                    <div class="stat-item green">
                      <div class="stat-value">${historyStats.totalBookmarks}</div>
                      <div class="stat-label">累计处理书签</div>
                    </div>
                    <div class="stat-item purple">
                      <div class="stat-value">${historyStats.totalSuccesses}</div>
                      <div class="stat-label">累计成功</div>
                    </div>
                    <div class="stat-item red">
                      <div class="stat-value">${historyStats.totalFailures}</div>
                      <div class="stat-label">累计失败</div>
                    </div>
                    <div class="stat-item orange">
                      <div class="stat-value">${historyStats.successRate}%</div>
                      <div class="stat-label">历史成功率</div>
                    </div>
                  </div>
                </div>
              `;
            }
            
            const currentStatsHtml = `
              <div class="stats-section">
                <div class="stats-section-header">
                  <h3>📊 当前书签状态</h3>
                  <span class="stats-hint">数据为本地镜像中的当前实际数量</span>
                </div>
                <div class="history-stats">
                  <div class="stat-item blue">
                    <div class="stat-value">${currentStats.totalFolders || 0}</div>
                    <div class="stat-label">当前总文件夹</div>
                  </div>
                  <div class="stat-item green">
                    <div class="stat-value">${currentStats.totalBookmarks || 0}</div>
                    <div class="stat-label">当前书签总数</div>
                  </div>
                  <div class="stat-item purple">
                    <div class="stat-value">${currentStats.completedBookmarks || 0}</div>
                    <div class="stat-label">当前已同步</div>
                  </div>
                  <div class="stat-item red">
                    <div class="stat-value">${currentStats.failedBookmarks || 0}</div>
                    <div class="stat-label">当前失败</div>
                  </div>
                  <div class="stat-item orange">
                    <div class="stat-value">${currentStats.successRate || 0}%</div>
                    <div class="stat-label">当前成功率</div>
                  </div>
                </div>
              </div>
            `;
            
            statsContainer.innerHTML = historyStatsHtml + currentStatsHtml;
            
            if (errorDist && errorDist.length > 0) {
              errorDistribution.style.display = 'block';
              errorTypeList.innerHTML = errorDist.map(type => `
                <div class="error-type-card">
                  <div class="error-type-header">
                    <span class="error-type-name">${escapeHtml(type.error_type)}</span>
                    <div style="display: flex; align-items: center; gap: 8px;">
                      <span class="error-type-count">${type.count} 次</span>
                    </div>
                  </div>
                  <div class="error-type-desc">${escapeHtml(type.description)}</div>
                </div>
              `).join('');
            }
          }
        } catch (error) {
          console.error('加载统计信息失败:', error);
          try {
            const result = await apiRequest('/api/sync-history/stats', { method: 'GET' });
            
            if (result.data && result.data.success) {
              const stats = result.data.data.stats;
              const errorDist = result.data.data.errorDistribution;
              
              statsContainer.innerHTML = `
                <div class="stats-section">
                  <div class="stats-section-header">
                    <h3>📈 历史累计统计</h3>
                    <span class="stats-hint">数据为所有同步批次的累计值</span>
                  </div>
                  <div class="history-stats">
                    <div class="stat-item blue">
                      <div class="stat-value">${stats.totalSyncs}</div>
                      <div class="stat-label">累计同步次数</div>
                    </div>
                    <div class="stat-item green">
                      <div class="stat-value">${stats.totalBookmarks}</div>
                      <div class="stat-label">累计处理书签</div>
                    </div>
                    <div class="stat-item red">
                      <div class="stat-value">${stats.totalFailures}</div>
                      <div class="stat-label">累计失败</div>
                    </div>
                    <div class="stat-item orange">
                      <div class="stat-value">${stats.successRate}%</div>
                      <div class="stat-label">历史成功率</div>
                    </div>
                  </div>
                </div>
              `;
              
              if (errorDist && errorDist.length > 0) {
                errorDistribution.style.display = 'block';
                errorTypeList.innerHTML = errorDist.map(type => `
                  <div class="error-type-card">
                    <div class="error-type-header">
                      <span class="error-type-name">${escapeHtml(type.error_type)}</span>
                      <div style="display: flex; align-items: center; gap: 8px;">
                        <span class="error-type-count">${type.count} 次</span>
                      </div>
                    </div>
                    <div class="error-type-desc">${escapeHtml(type.description)}</div>
                  </div>
                `).join('');
              }
            }
          } catch (e) {
            console.error('备用统计加载也失败:', e);
          }
        }
      }
      
      async function loadHistory() {
        historyContainer.innerHTML = '<div class="loading">⏳ 加载中...</div>';
        
        try {
          const result = await apiRequest('/api/sync-history', { method: 'GET' });
          
          if (result.data && result.data.success) {
            const historyList = result.data.data.history;
            
            if (historyList.length === 0) {
              historyContainer.innerHTML = `
                <div class="empty-state">
                  <div class="empty-state-icon">📭</div>
                  <div class="empty-state-text">暂无同步历史记录</div>
                  <div class="empty-state-hint">点击"同步书签"开始导入书签后，历史记录将显示在这里</div>
                </div>
              `;
              return;
            }
            
            historyContainer.innerHTML = `
              <div class="history-list">
                ${historyList.map(item => renderHistoryItem(item)).join('')}
              </div>
            `;
            
            document.querySelectorAll('.history-summary').forEach(el => {
              el.addEventListener('click', function() {
                const item = this.closest('.history-item');
                const id = item.dataset.id;
                
                if (expandedIds.has(id)) {
                  item.classList.remove('expanded');
                  expandedIds.delete(id);
                } else {
                  item.classList.add('expanded');
                  expandedIds.add(id);
                  loadHistoryDetail(id, item);
                }
              });
            });
          } else {
            throw new Error(result.data?.message || '加载失败');
          }
        } catch (error) {
          const errorMsg = error.message || '请稍后重试';
          const isNetworkError = errorMsg.includes('网络') || errorMsg.includes('网络请求');
          const isServerError = errorMsg.includes('服务器') || errorMsg.includes('响应');
          
          let displayTitle, displayMsg, displayIcon;
          
          if (isNetworkError) {
            displayIcon = '🌐';
            displayTitle = '网络连接失败';
            displayMsg = '无法连接到服务器，请检查网络连接后重试';
          } else if (isServerError) {
            displayIcon = '🔧';
            displayTitle = '服务器响应异常';
            displayMsg = '服务器暂时无法处理请求，请稍后重试';
          } else {
            displayIcon = '⚠️';
            displayTitle = '加载失败';
            displayMsg = errorMsg;
          }
          
          historyContainer.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">${displayIcon}</div>
              <div class="empty-state-text">${escapeHtml(displayTitle)}</div>
              <div class="empty-state-hint" style="margin-bottom: 16px;">${escapeHtml(displayMsg)}</div>
              <div style="display: flex; gap: 12px; justify-content: center;">
                <button class="btn btn-primary" onclick="loadHistory(); loadStats();" style="padding: 10px 24px;">
                  🔄 刷新重试
                </button>
                <a href="/bookmarks.html" class="btn btn-secondary" style="text-decoration: none; padding: 10px 24px;">
                  🏠 返回主页
                </a>
              </div>
            </div>
          `;
        }
      }
      
      async function loadHistoryDetail(id, itemEl) {
        const detailEl = itemEl.querySelector('.history-detail');
        
        if (detailEl.querySelector('.detail-section')) {
          return;
        }
        
        try {
          const result = await apiRequest(`/api/sync-history/${id}`, { method: 'GET' });
          
          if (result.data && result.data.success) {
            const data = result.data.data;
            const hasFailures = data.failures && data.failures.length > 0;
            
            detailEl.innerHTML = `
              <div class="detail-section">
                <div class="detail-title">📋 同步详情</div>
                <div class="summary-grid">
                  <div class="summary-item">
                    <span class="summary-label">浏览器来源</span>
                    <span class="summary-value">${getBrowserName(data.browser_source)}</span>
                  </div>
                  <div class="summary-item">
                    <span class="summary-label">总文件夹</span>
                    <span class="summary-value">${data.total_folders || 0} 个</span>
                  </div>
                  <div class="summary-item">
                    <span class="summary-label">创建文件夹</span>
                    <span class="summary-value">${data.folders_created || 0} 个</span>
                  </div>
                  <div class="summary-item">
                    <span class="summary-label">跳过重复</span>
                    <span class="summary-value">${data.duplicates_found || 0} 个</span>
                  </div>
                  <div class="summary-item">
                    <span class="summary-label">同步耗时</span>
                    <span class="summary-value">${data.duration_formatted || '未知'}</span>
                  </div>
                  <div class="summary-item">
                    <span class="summary-label">同步目录</span>
                    <span class="summary-value" style="font-size: 12px; word-break: break-all;">${escapeHtml(data.sync_dir || '-')}</span>
                  </div>
                </div>
              </div>
              
              ${hasFailures ? `
              <div class="detail-section">
                <div class="detail-title">
                  🔧 快捷操作
                </div>
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                  <button class="retry-btn primary retry-batch-btn" data-sync-id="${data.sync_id}">
                    <span>🔄</span>
                    <span>一键重试该批次所有失败书签</span>
                  </button>
                </div>
              </div>
              
              <div class="detail-section">
                <div class="detail-title">❌ 失败详情 (${data.failures.length} 个)</div>
                <div class="failures-list">
                  ${data.failures.map(failure => `
                    <div class="failure-item">
                      <div class="failure-header">
                        <div class="failure-title">${escapeHtml(failure.bookmark_title || '未知标题')}</div>
                        <span class="failure-type">${escapeHtml(failure.error_type)}</span>
                      </div>
                      <div class="failure-url">🔗 ${escapeHtml(failure.bookmark_url || '-')}</div>
                      ${failure.folder_path ? `<div class="failure-folder">📁 ${escapeHtml(failure.folder_path)}</div>` : ''}
                      <div class="failure-desc">
                        <strong>错误说明:</strong> ${escapeHtml(failure.error_description)}
                        ${failure.error_message ? `<br><strong>具体错误:</strong> ${escapeHtml(failure.error_message)}` : ''}
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
              ` : `
              <div class="detail-section">
                <div class="detail-title">✅ 全部成功</div>
                <div class="no-failures">
                  🎉 本次同步所有书签均处理成功，没有失败项
                </div>
              </div>
              `}
            `;
            
            if (hasFailures) {
              const retryBtn = detailEl.querySelector('.retry-batch-btn');
              if (retryBtn) {
                retryBtn.addEventListener('click', function(e) {
                  e.stopPropagation();
                  const syncId = this.dataset.syncId;
                  if (syncId) {
                    retryBatch(syncId);
                  }
                });
              }
            }
          }
        } catch (error) {
          console.error('加载详情失败:', error);
          const errorMsg = error.message || '请稍后重试';
          detailEl.innerHTML = `
            <div style="text-align: center; padding: 24px;">
              <div style="font-size: 32px; margin-bottom: 12px;">⚠️</div>
              <div style="color: #dc2626; font-weight: 500; margin-bottom: 8px;">加载详情失败</div>
              <div style="color: #6b7280; font-size: 14px; margin-bottom: 16px;">${escapeHtml(errorMsg)}</div>
              <button class="btn btn-secondary" onclick="loadHistoryDetail('${id}', this.closest('.history-item'));">
                🔄 重新加载
              </button>
            </div>
          `;
        }
      }
      
      function renderHistoryItem(item) {
        const status = item.status;
        const statusLabel = getStatusLabel(status);
        const iconEmoji = status === 'completed' ? '✅' : status === 'partial' ? '⚠️' : '❌';
        const totalCount = item.total_count || 0;
        const successCount = item.success_count || 0;
        const failedCount = item.failed_count || 0;
        const hasBackup = item.backup_file_path && item.backup_file_path.trim() !== '';
        
        return `
          <div class="history-item ${expandedIds.has(item.id) ? 'expanded' : ''}" data-id="${item.id}">
            <div class="history-summary">
              <div class="history-icon ${status}">${iconEmoji}</div>
              <div class="history-info">
                <div class="history-title">
                  ${formatDate(item.executed_at)}
                  <span class="history-badge ${status}">${statusLabel}</span>
                  ${hasBackup ? `<span class="history-badge" style="background: #059669; color: white;">📦 已备份</span>` : ''}
                </div>
                <div class="history-meta">
                  <span>📁 ${getBrowserName(item.browser_source)}</span>
                  <span>📊 成功率: ${totalCount > 0 ? Math.round((successCount / totalCount) * 100) : 100}%</span>
                  ${item.duration_formatted ? `<span>⏱️ ${item.duration_formatted}</span>` : ''}
                </div>
              </div>
              <div class="history-stats-bar">
                <span class="stat-badge success">✅ ${successCount}</span>
                <span class="stat-badge failed">❌ ${failedCount}</span>
                ${hasBackup ? `
                  <button class="download-btn download-btn-small download-backup-btn" data-id="${item.id}" onclick="event.stopPropagation(); downloadBackup(${item.id});">
                    <span>📥</span>
                    <span>下载备份</span>
                  </button>
                ` : `
                  <span class="no-backup-badge">
                    <span>📭</span>
                    <span>无备份</span>
                  </span>
                `}
              </div>
              <span class="expand-icon">▼</span>
            </div>
            <div class="history-detail">
              <div style="text-align: center; padding: 20px; color: #6b7280;">⏳ 加载详情中...</div>
            </div>
          </div>
        `;
      }
      
      function getBrowserName(source) {
        if (!source) return '未知';
        const names = {
          'chrome': 'Google Chrome',
          'edge': 'Microsoft Edge',
          'firefox': 'Mozilla Firefox',
          'safari': 'Safari',
          'manual_upload': '手动上传'
        };
        return names[source] || source;
      }
      
      function getStatusLabel(status) {
        const labels = {
          'completed': '全部成功',
          'partial': '部分成功',
          'failed': '同步失败'
        };
        return labels[status] || status;
      }
      
      function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
      
      function formatDate(dateStr) {
        if (!dateStr) return '未知时间';
        const date = new Date(dateStr);
        return date.toLocaleString('zh-CN', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        });
      }
      
      refreshBtn.addEventListener('click', function() {
        loadStats();
        loadHistory();
        loadBackupConfig();
        showToast('已刷新', 'success');
      });
      
      connectWebSocket();
      loadStats();
      loadHistory();
      loadBackupConfig();
    });
  </script>
</body>
