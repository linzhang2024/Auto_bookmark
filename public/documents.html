<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档管理 - 书签管理系统</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="main-content">
    <div class="page-header">
      <h1>📁 文档管理</h1>
      <button class="btn btn-primary" id="uploadBtn">
        <span>⬆️</span>
        <span>上传文档</span>
      </button>
    </div>
    
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-card-header">
          <span class="stat-card-title">总文档数</span>
          <span class="stat-card-icon">📄</span>
        </div>
        <div class="stat-card-value" id="totalDocs">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-header">
          <span class="stat-card-title">已就绪</span>
          <span class="stat-card-icon">✅</span>
        </div>
        <div class="stat-card-value" id="readyDocs">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-header">
          <span class="stat-card-title">处理中</span>
          <span class="stat-card-icon">⏳</span>
        </div>
        <div class="stat-card-value" id="pendingDocs">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-header">
          <span class="stat-card-title">失败</span>
          <span class="stat-card-icon">❌</span>
        </div>
        <div class="stat-card-value" id="failedDocs">0</div>
      </div>
    </div>
    
    <div class="card">
      <div class="filter-bar" style="flex-wrap: wrap; gap: 12px;">
        <select class="form-select" id="statusFilter" style="width: 140px;">
          <option value="">全部状态</option>
          <option value="ready">已就绪</option>
          <option value="pending">处理中</option>
          <option value="failed">失败</option>
        </select>
        <input type="date" class="form-input" id="dateFrom" placeholder="开始日期" title="开始日期" style="width: 160px;">
        <span style="color: #9ca3af;">至</span>
        <input type="date" class="form-input" id="dateTo" placeholder="结束日期" title="结束日期" style="width: 160px;">
        <div style="display: flex; flex: 1; min-width: 200px; gap: 8px;">
          <input type="text" class="form-input" id="searchInput" placeholder="搜索文件名、内容..." style="flex: 1;">
          <button class="btn btn-primary" id="searchBtn" style="white-space: nowrap;">
            <span>🔍</span>
            <span>搜索</span>
          </button>
        </div>
        <button class="btn btn-secondary" id="clearFilterBtn" title="清除筛选条件">
          <span>✕</span>
          <span>清除</span>
        </button>
        <button class="btn btn-secondary" id="refreshBtn" title="刷新">
          <span>🔄</span>
          <span>刷新</span>
        </button>
      </div>
      
      <div id="searchInfo" style="padding: 8px 16px; background: #f0f9ff; border-bottom: 1px solid #e0e7ff; color: #1d4ed8; font-size: 13px; display: none;">
        <span id="searchInfoText"></span>
      </div>
      
      <div class="table-container">
        <table id="documentsTable">
          <thead>
            <tr>
              <th>文件名</th>
              <th>大小</th>
              <th>类型</th>
              <th>状态</th>
              <th>上传时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="documentsBody">
            <tr>
              <td colspan="6" style="text-align: center; padding: 40px; color: #9ca3af;">
                加载中...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="uploadModal">
    <div class="modal">
      <div class="modal-header">
        <h3>上传文档</h3>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="upload-area" id="uploadArea">
          <input type="file" id="fileInput" style="display: none;" multiple>
          <div class="upload-icon">📁</div>
          <div class="upload-text">点击选择文件或拖拽文件到此处</div>
          <div class="upload-hint">支持 PDF、Word、Excel、图片等常见格式</div>
        </div>
        
        <div id="uploadPreview" style="display: none;">
          <h4 style="margin-bottom: 16px; font-size: 14px; color: #374151;">待上传文件</h4>
          <div id="fileList"></div>
        </div>
        
        <div id="uploadProgress" style="display: none; margin-top: 20px;">
          <div class="progress-container">
            <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
          </div>
          <div class="progress-text" id="progressText">准备上传...</div>
        </div>
        
        <div id="uploadError" class="alert alert-error" style="display: none; margin-top: 16px;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelUpload">取消</button>
        <button class="btn btn-primary" id="confirmUpload" disabled>
          <span>📤</span>
          <span>开始上传</span>
        </button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="deleteModal">
    <div class="modal" style="max-width: 400px;">
      <div class="modal-header">
        <h3>确认删除</h3>
        <button class="modal-close" id="closeDeleteModal">&times;</button>
      </div>
      <div class="modal-body">
        <div style="text-align: center; padding: 20px 0;">
          <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
          <div style="font-size: 16px; color: #374151; margin-bottom: 8px;">确定要删除此文档吗？</div>
          <div id="deleteFileName" style="font-weight: 600; color: #1a1a2e; margin-bottom: 16px;"></div>
          <div style="font-size: 13px; color: #9ca3af;">此操作不可恢复，文件将从服务器永久删除。</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelDelete">取消</button>
        <button class="btn btn-danger" id="confirmDelete">
          <span>🗑️</span>
          <span>确认删除</span>
        </button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="versionModal">
    <div class="modal" style="max-width: 900px; width: 90%;">
      <div class="modal-header">
        <div>
          <h3 id="versionModalTitle">版本历史</h3>
          <div id="versionModalSubtitle" style="font-size: 13px; color: #64748b; margin-top: 4px;"></div>
        </div>
        <button class="modal-close" id="closeVersionModal">&times;</button>
      </div>
      <div class="modal-body" style="padding: 0; max-height: 70vh;">
        <div style="padding: 16px 20px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
          <button class="btn btn-primary btn-sm" id="createVersionBtn">
            <span>📝</span>
            <span>创建新版本</span>
          </button>
          <button class="btn btn-info btn-sm" id="compareVersionsBtn" disabled>
            <span>🔍</span>
            <span>比对选中版本</span>
          </button>
          <div style="flex: 1;"></div>
          <button class="btn btn-secondary btn-sm" id="refreshVersionsBtn">
            <span>🔄</span>
            <span>刷新</span>
          </button>
        </div>
        
        <div id="versionList" style="overflow-y: auto; max-height: calc(70vh - 140px);">
          <div style="text-align: center; padding: 40px; color: #9ca3af;">
            加载中...
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="closeVersionModalBtn">关闭</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="createVersionModal">
    <div class="modal" style="max-width: 500px;">
      <div class="modal-header">
        <h3>创建新版本</h3>
        <button class="modal-close" id="closeCreateVersionModal">&times;</button>
      </div>
      <div class="modal-body">
        <div style="margin-bottom: 16px;">
          <label class="form-label">版本标签 (可选)</label>
          <input type="text" class="form-input" id="versionLabel" placeholder="例如: v1.0.0、初始版本">
        </div>
        <div style="margin-bottom: 16px;">
          <label class="form-label">变更摘要 (可选)</label>
          <textarea class="form-input" id="changeSummary" rows="3" placeholder="描述本次版本的主要变更..."></textarea>
        </div>
        <div style="margin-bottom: 16px;">
          <label class="form-label">上传新版本文件 (可选)</label>
          <div class="upload-area" id="newVersionUploadArea" style="padding: 20px; min-height: auto; margin-top: 8px;">
            <input type="file" id="newVersionFileInput" style="display: none;">
            <div class="upload-icon" style="font-size: 24px;">📁</div>
            <div class="upload-text" style="font-size: 13px;">点击选择文件或拖拽文件到此处</div>
            <div class="upload-hint" style="font-size: 12px;">留空则使用当前文档内容创建版本</div>
          </div>
          <div id="newVersionFileInfo" style="display: none; margin-top: 12px; padding: 12px; background: #f0fdf4; border-radius: 8px;">
            <div style="display: flex; align-items: center; gap: 8px;">
              <span style="font-size: 20px;">✅</span>
              <div>
                <div id="newVersionFileName" style="font-weight: 500; color: #166534;"></div>
                <div id="newVersionFileSize" style="font-size: 12px; color: #15803d;"></div>
              </div>
              <button class="btn btn-danger btn-sm" id="clearNewVersionFile" style="margin-left: auto; padding: 4px 8px; font-size: 12px;">
                移除
              </button>
            </div>
          </div>
        </div>
        <div class="alert alert-info" style="font-size: 12px;">
          💡 提示：如果不上传新文件，系统将使用当前文档的内容创建版本快照。
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelCreateVersion">取消</button>
        <button class="btn btn-primary" id="confirmCreateVersion">
          <span>✅</span>
          <span>创建版本</span>
        </button>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      checkAuth();
      renderNav();
      
      let selectedFiles = [];
      let documents = [];
      let pendingDelete = null;
      
      const uploadBtn = document.getElementById('uploadBtn');
      const uploadModal = document.getElementById('uploadModal');
      const closeModal = document.getElementById('closeModal');
      const uploadArea = document.getElementById('uploadArea');
      const fileInput = document.getElementById('fileInput');
      const uploadPreview = document.getElementById('uploadPreview');
      const fileList = document.getElementById('fileList');
      const cancelUpload = document.getElementById('cancelUpload');
      const confirmUpload = document.getElementById('confirmUpload');
      const uploadProgress = document.getElementById('uploadProgress');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      const uploadError = document.getElementById('uploadError');
      const statusFilter = document.getElementById('statusFilter');
      const searchInput = document.getElementById('searchInput');
      const searchBtn = document.getElementById('searchBtn');
      const clearFilterBtn = document.getElementById('clearFilterBtn');
      const refreshBtn = document.getElementById('refreshBtn');
      const dateFrom = document.getElementById('dateFrom');
      const dateTo = document.getElementById('dateTo');
      const searchInfo = document.getElementById('searchInfo');
      const searchInfoText = document.getElementById('searchInfoText');
      
      const deleteModal = document.getElementById('deleteModal');
      const closeDeleteModal = document.getElementById('closeDeleteModal');
      const deleteFileName = document.getElementById('deleteFileName');
      const cancelDelete = document.getElementById('cancelDelete');
      const confirmDelete = document.getElementById('confirmDelete');
      
      function openDeleteModal(id, name) {
        pendingDelete = { id, name };
        deleteFileName.textContent = `"${name}"`;
        deleteModal.classList.add('active');
      }
      
      function closeDeleteModalFunc() {
        deleteModal.classList.remove('active');
        pendingDelete = null;
      }
      
      async function executeDelete() {
        if (!pendingDelete) return;
        
        const { id, name } = pendingDelete;
        confirmDelete.disabled = true;
        cancelDelete.disabled = true;
        
        try {
          const result = await apiRequest(`/api/documents/${id}`, {
            method: 'DELETE',
            body: { user_id: AppState.user.id }
          });
          
          if (result.data && result.data.success) {
            showToast('删除成功', 'success');
            closeDeleteModalFunc();
            loadDocuments();
          } else {
            showToast(result.data?.message || '删除失败', 'error');
            confirmDelete.disabled = false;
            cancelDelete.disabled = false;
          }
        } catch (error) {
          showToast('网络错误，请稍后重试', 'error');
          confirmDelete.disabled = false;
          cancelDelete.disabled = false;
        }
      }
      
      function openModal() {
        uploadModal.classList.add('active');
        resetUploadForm();
      }
      
      function closeModalFunc() {
        uploadModal.classList.remove('active');
      }
      
      function resetUploadForm() {
        selectedFiles = [];
        fileInput.value = '';
        uploadPreview.style.display = 'none';
        fileList.innerHTML = '';
        uploadProgress.style.display = 'none';
        uploadError.style.display = 'none';
        confirmUpload.disabled = true;
      }
      
      function handleFiles(files) {
        if (!files || files.length === 0) return;
        
        selectedFiles = Array.from(files);
        renderFileList();
        uploadPreview.style.display = 'block';
        confirmUpload.disabled = selectedFiles.length === 0;
      }
      
      function renderFileList() {
        fileList.innerHTML = selectedFiles.map((file, index) => `
          <div class="upload-preview">
            <div class="upload-preview-icon">${getFileIcon(file.name)}</div>
            <div class="upload-preview-info">
              <div class="upload-preview-name">${escapeHtml(file.name)}</div>
              <div class="upload-preview-size">${formatFileSize(file.size)}</div>
            </div>
            <button class="btn btn-danger btn-sm" data-index="${index}" style="padding: 4px 8px; font-size: 12px;">
              ✕
            </button>
          </div>
        `).join('');
        
        fileList.querySelectorAll('[data-index]').forEach(btn => {
          btn.addEventListener('click', function() {
            const index = parseInt(this.dataset.index, 10);
            selectedFiles.splice(index, 1);
            renderFileList();
            confirmUpload.disabled = selectedFiles.length === 0;
            if (selectedFiles.length === 0) {
              uploadPreview.style.display = 'none';
            }
          });
        });
      }
      
      function getFileIcon(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        const icons = {
          pdf: '📕',
          doc: '📘', docx: '📘',
          xls: '📗', xlsx: '📗',
          ppt: '📙', pptx: '📙',
          jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', bmp: '🖼️', webp: '🖼️',
          txt: '📝',
          html: '🌐', htm: '🌐',
          css: '🎨',
          js: '⚡',
          json: '📋',
          zip: '📦', rar: '📦', '7z': '📦',
          mp3: '🎵', wav: '🎵', flac: '🎵',
          mp4: '🎬', avi: '🎬', mov: '🎬'
        };
        return icons[ext] || '📄';
      }
      
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
      
      async function uploadFiles() {
        if (selectedFiles.length === 0) return;
        
        console.log('[Upload] 开始上传流程，文件数量:', selectedFiles.length);
        
        confirmUpload.disabled = true;
        uploadProgress.style.display = 'block';
        uploadError.style.display = 'none';
        
        let successCount = 0;
        let failCount = 0;
        
        for (let i = 0; i < selectedFiles.length; i++) {
          const file = selectedFiles[i];
          const progress = Math.round(((i) / selectedFiles.length) * 100);
          progressBar.style.width = progress + '%';
          progressText.textContent = `正在上传: ${file.name} (${i + 1}/${selectedFiles.length})`;
          
          console.log(`[Upload] 处理文件 ${i + 1}/${selectedFiles.length}:`, {
            name: file.name,
            size: file.size,
            type: file.type
          });
          
          try {
            const fileBase64 = await readFileAsBase64(file);
            console.log(`[Upload] 文件 ${file.name} 转换为 Base64 完成，长度:`, fileBase64.length);
            
            const uploadBody = {
              filename: file.name,
              file_base64: fileBase64.split(',')[1] || fileBase64,
              uploader_id: AppState.user.id,
              metadata: {
                original_name: file.name,
                mime_type: file.type
              }
            };
            
            console.log(`[Upload] 准备发送请求到 /api/documents/upload`);
            console.log('[Upload] 请求体 (file_base64 已截断):', {
              ...uploadBody,
              file_base64: `[BASE64 数据，长度: ${uploadBody.file_base64.length} 字符]`
            });
            
            const result = await apiRequest('/api/documents/upload', {
              method: 'POST',
              body: uploadBody
            });
            
            console.log(`[Upload] 文件 ${file.name} 上传结果:`, result);
            
            if (result.data && result.data.success) {
              successCount++;
              console.log(`[Upload] ✓ 文件 ${file.name} 上传成功`);
            } else {
              failCount++;
              console.error(`[Upload] ✗ 文件 ${file.name} 上传失败:`, result.data?.message);
              console.error('[Upload] 完整响应:');
              console.dir(result);
            }
          } catch (error) {
            failCount++;
            console.error(`[Upload] ✗ 文件 ${file.name} 上传异常:`);
            console.dir(error);
          }
        }
        
        progressBar.style.width = '100%';
        progressText.textContent = '上传完成';
        
        console.log(`[Upload] 上传完成统计: 成功 ${successCount}, 失败 ${failCount}`);
        
        if (failCount > 0) {
          uploadError.textContent = `${successCount} 个文件上传成功，${failCount} 个文件上传失败`;
          uploadError.className = 'alert alert-warning';
          uploadError.style.display = 'block';
        } else {
          showToast(`成功上传 ${successCount} 个文件`, 'success');
        }
        
        setTimeout(() => {
          closeModalFunc();
          loadDocuments();
        }, 1000);
      }
      
      function openFileSelector() {
        fileInput.click();
      }
      
      function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }
      
      let currentSearchKeyword = '';
      
      async function loadDocuments() {
        const documentsBody = document.getElementById('documentsBody');
        documentsBody.innerHTML = `
          <tr>
            <td colspan="6" style="text-align: center; padding: 40px; color: #9ca3af;">
              加载中...
            </td>
          </tr>
        `;
        
        try {
          const result = await apiRequest('/api/documents', {
            method: 'GET'
          });
          
          if (result.data && result.data.success) {
            documents = result.data.documents || [];
            renderDocuments(documents);
            updateStats();
          } else {
            documentsBody.innerHTML = `
              <tr>
                <td colspan="6" style="text-align: center; padding: 40px; color: #9ca3af;">
                  加载失败: ${result.data?.message || '未知错误'}
                </td>
              </tr>
            `;
          }
        } catch (error) {
          documentsBody.innerHTML = `
            <tr>
              <td colspan="6" style="text-align: center; padding: 40px; color: #9ca3af;">
                网络错误，请稍后重试
              </td>
            </tr>
          `;
        }
      }
      
      async function searchDocuments() {
        const documentsBody = document.getElementById('documentsBody');
        const keyword = searchInput.value.trim();
        const status = statusFilter.value;
        const dateFromValue = dateFrom.value;
        const dateToValue = dateTo.value;
        
        console.log('========================================');
        console.log('[前端] 文档搜索开始');
        console.log('[前端] 输入值:');
        console.log('  - keyword:', `"${keyword}"`);
        console.log('  - keyword 长度:', keyword.length);
        console.log('  - status:', `"${status}"`);
        console.log('  - dateFrom:', `"${dateFromValue}"`);
        console.log('  - dateTo:', `"${dateToValue}"`);
        
        const hasKeyword = keyword && keyword.length > 0;
        const hasStatus = status && status.length > 0;
        const hasDateFrom = dateFromValue && dateFromValue.length > 0;
        const hasDateTo = dateToValue && dateToValue.length > 0;
        const hasFilters = hasKeyword || hasStatus || hasDateFrom || hasDateTo;
        
        console.log('[前端] 条件判断:');
        console.log('  - hasKeyword:', hasKeyword);
        console.log('  - hasStatus:', hasStatus);
        console.log('  - hasDateFrom:', hasDateFrom);
        console.log('  - hasDateTo:', hasDateTo);
        console.log('  - hasFilters:', hasFilters);
        
        if (!hasFilters) {
          console.log('[前端] 没有任何筛选条件，清除搜索');
          console.log('========================================');
          searchInfo.style.display = 'none';
          currentSearchKeyword = '';
          loadDocuments();
          return;
        }
        
        documentsBody.innerHTML = `
          <tr>
            <td colspan="6" style="text-align: center; padding: 40px; color: #9ca3af;">
              搜索中...
            </td>
          </tr>
        `;
        
        const params = new URLSearchParams();
        
        console.log('[前端] 构建 URL 参数:');
        
        if (hasKeyword) {
          params.append('keyword', keyword);
          params.append('highlight_keyword', 'true');
          console.log('  - 添加 keyword:', `"${keyword}"`);
          console.log('  - 添加 highlight_keyword: "true"');
        }
        if (hasStatus) {
          params.append('status', status);
          console.log('  - 添加 status:', `"${status}"`);
        }
        if (hasDateFrom) {
          params.append('date_from', dateFromValue);
          console.log('  - 添加 date_from:', `"${dateFromValue}"`);
        }
        if (hasDateTo) {
          params.append('date_to', dateToValue);
          console.log('  - 添加 date_to:', `"${dateToValue}"`);
        }
        
        const queryString = params.toString();
        const fullUrl = `/api/documents/search?${queryString}`;
        
        console.log('[前端] 完整请求 URL:');
        console.log('  - URL:', fullUrl);
        console.log('  - URL 编码后的 queryString:', queryString);
        
        console.log('[前端] URL 参数解码后:');
        params.forEach((value, key) => {
          console.log(`  - ${key}: "${value}"`);
        });
        
        currentSearchKeyword = keyword;
        
        console.log('[前端] 发送请求...');
        console.log('========================================');
        
        try {
          const result = await apiRequest(fullUrl, {
            method: 'GET'
          });
          
          console.log('========================================');
          console.log('[前端] 收到响应:');
          console.log('  - success:', result.data?.success);
          console.log('  - total:', result.data?.total);
          console.log('  - documents 数量:', result.data?.documents?.length);
          console.log('========================================');
          
          if (result.data && result.data.success) {
            documents = result.data.documents || [];
            renderDocuments(documents);
            
            let infoParts = [];
            if (keyword) infoParts.push(`"${escapeHtml(keyword)}"`);
            if (status) infoParts.push(`状态: ${getStatusText(status)}`);
            if (dateFromValue) infoParts.push(`从 ${dateFromValue}`);
            if (dateToValue) infoParts.push(`至 ${dateToValue}`);
            
            searchInfoText.innerHTML = `搜索结果: 找到 ${documents.length} 个文档 (${infoParts.join(', ')})`;
            searchInfo.style.display = 'block';
          } else {
            documentsBody.innerHTML = `
              <tr>
                <td colspan="6" style="text-align: center; padding: 40px; color: #9ca3af;">
                  搜索失败: ${result.data?.message || '未知错误'}
                </td>
              </tr>
            `;
          }
        } catch (error) {
          console.error('[前端] 文档搜索请求异常:', error);
          documentsBody.innerHTML = `
            <tr>
              <td colspan="6" style="text-align: center; padding: 40px; color: #9ca3af;">
                网络错误，请稍后重试
              </td>
            </tr>
          `;
        }
      }
      
      function clearFilters() {
        searchInput.value = '';
        statusFilter.value = '';
        dateFrom.value = '';
        dateTo.value = '';
        searchInfo.style.display = 'none';
        currentSearchKeyword = '';
        loadDocuments();
      }
      
      function renderDocuments(docsList) {
        const documentsBody = document.getElementById('documentsBody');
        const docs = docsList || documents;
        
        if (docs.length === 0) {
          documentsBody.innerHTML = `
            <tr>
              <td colspan="6">
                <div class="empty-state">
                  <div class="empty-state-icon">📂</div>
                  <div class="empty-state-text">暂无文档</div>
                  <div class="empty-state-hint">点击上方"上传文档"按钮添加新文档</div>
                </div>
              </td>
            </tr>
          `;
          return;
        }
        
        documentsBody.innerHTML = docs.map(doc => {
          let displayName = escapeHtml(doc.filename);
          let highlightInfo = '';
          
          if (doc.highlights) {
            if (doc.highlights.filename) {
              displayName = doc.highlights.filename;
            }
            if (doc.highlights.matchingFields && doc.highlights.matchingFields.length > 0) {
              const matchCount = doc.highlights.matchingFields.length;
              highlightInfo = `<span style="color: #f59e0b; font-size: 12px;" title="匹配字段: ${doc.highlights.matchingFields.map(f => f.field).join(', ')}">+${matchCount} 内容匹配</span>`;
            }
          }
          
          return `
          <tr>
            <td>
              <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 20px;">${getFileIcon(doc.filename)}</span>
                <div style="display: flex; flex-direction: column; gap: 2px;">
                  <span>${displayName}</span>
                  ${highlightInfo ? highlightInfo : ''}
                </div>
              </div>
            </td>
            <td>${formatFileSize(doc.file_size)}</td>
            <td>${doc.mime_type || '-'}</td>
            <td>
              <span class="status-badge status-${doc.status}">
                ${getStatusText(doc.status)}
              </span>
            </td>
            <td>${formatDate(doc.created_at)}</td>
            <td>
              <div class="actions-cell" style="display: flex; gap: 8px;">
                <button class="btn btn-secondary btn-sm view-btn" data-id="${doc.id}" data-name="${escapeHtml(doc.filename)}" data-mime="${doc.mime_type || ''}" data-keyword="${escapeHtml(currentSearchKeyword)}">
                  查看
                </button>
                <button class="btn btn-info btn-sm version-btn" data-id="${doc.id}" data-name="${escapeHtml(doc.filename)}">
                  版本历史
                </button>
                <button class="btn btn-primary btn-sm download-btn" data-id="${doc.id}" data-name="${escapeHtml(doc.filename)}">
                  下载
                </button>
                <button class="btn btn-danger btn-sm delete-btn" data-id="${doc.id}" data-name="${escapeHtml(doc.filename)}">
                  删除
                </button>
              </div>
            </td>
          </tr>
        `}).join('');
        
        documentsBody.querySelectorAll('.view-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const id = parseInt(this.dataset.id, 10);
            const name = this.dataset.name;
            const mime = this.dataset.mime;
            const keyword = this.dataset.keyword || '';
            
            const viewableTypes = ['application/pdf', 'image/', 'text/'];
            const isViewable = viewableTypes.some(type => mime.startsWith(type));
            
            if (!isViewable && mime !== '') {
              showToast('该文件类型不支持在线预览，请下载后查看', 'warning');
              return;
            }
            
            let viewUrl = `/view.html?id=${id}`;
            if (keyword) {
              viewUrl += `&highlight=${encodeURIComponent(keyword)}`;
            }
            window.open(viewUrl, '_blank');
          });
        });
        
        documentsBody.querySelectorAll('.download-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const id = parseInt(this.dataset.id, 10);
            const name = this.dataset.name;
            
            const downloadUrl = `/api/documents/${id}/download`;
            window.location.href = downloadUrl;
            showToast(`正在下载: ${name}`, 'info');
          });
        });
        
        documentsBody.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const id = parseInt(this.dataset.id, 10);
            const name = this.dataset.name;
            openDeleteModal(id, name);
          });
        });
        
        documentsBody.querySelectorAll('.version-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const id = parseInt(this.dataset.id, 10);
            const name = this.dataset.name;
            openVersionModal(id, name);
          });
        });
      }
      
      function getStatusText(status) {
        const statusMap = {
          ready: '已就绪',
          pending: '处理中',
          failed: '失败'
        };
        return statusMap[status] || status;
      }
      
      function updateStats() {
        document.getElementById('totalDocs').textContent = documents.length;
        document.getElementById('readyDocs').textContent = documents.filter(d => d.status === 'ready').length;
        document.getElementById('pendingDocs').textContent = documents.filter(d => d.status === 'pending').length;
        document.getElementById('failedDocs').textContent = documents.filter(d => d.status === 'failed').length;
      }
      
      uploadBtn.addEventListener('click', openModal);
      closeModal.addEventListener('click', closeModalFunc);
      cancelUpload.addEventListener('click', closeModalFunc);
      confirmUpload.addEventListener('click', uploadFiles);
      
      uploadArea.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files.length > 0) {
          handleFiles(e.target.files);
        }
      });
      
      uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
      });
      
      uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragover');
      });
      
      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
      });
      
      document.addEventListener('dragover', (e) => {
        e.preventDefault();
      });
      
      document.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.target !== uploadArea && !uploadArea.contains(e.target)) {
          if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
            openModal();
            handleFiles(e.dataTransfer.files);
          }
        }
      });
      
      uploadModal.addEventListener('click', (e) => {
        if (e.target === uploadModal) {
          closeModalFunc();
        }
      });
      
      closeDeleteModal.addEventListener('click', closeDeleteModalFunc);
      cancelDelete.addEventListener('click', closeDeleteModalFunc);
      confirmDelete.addEventListener('click', executeDelete);
      
      deleteModal.addEventListener('click', (e) => {
        if (e.target === deleteModal) {
          closeDeleteModalFunc();
        }
      });
      
      statusFilter.addEventListener('change', searchDocuments);
      searchBtn.addEventListener('click', searchDocuments);
      clearFilterBtn.addEventListener('click', clearFilters);
      refreshBtn.addEventListener('click', loadDocuments);
      
      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          searchDocuments();
        }
      });
      
      dateFrom.addEventListener('change', searchDocuments);
      dateTo.addEventListener('change', searchDocuments);
      
      let currentDocumentId = null;
      let currentDocumentName = '';
      let versions = [];
      let selectedVersionIds = new Set();
      let newVersionFile = null;
      
      const versionModal = document.getElementById('versionModal');
      const closeVersionModal = document.getElementById('closeVersionModal');
      const closeVersionModalBtn = document.getElementById('closeVersionModalBtn');
      const versionModalTitle = document.getElementById('versionModalTitle');
      const versionModalSubtitle = document.getElementById('versionModalSubtitle');
      const versionList = document.getElementById('versionList');
      const createVersionBtn = document.getElementById('createVersionBtn');
      const compareVersionsBtn = document.getElementById('compareVersionsBtn');
      const refreshVersionsBtn = document.getElementById('refreshVersionsBtn');
      
      const createVersionModal = document.getElementById('createVersionModal');
      const closeCreateVersionModal = document.getElementById('closeCreateVersionModal');
      const versionLabel = document.getElementById('versionLabel');
      const changeSummary = document.getElementById('changeSummary');
      const newVersionUploadArea = document.getElementById('newVersionUploadArea');
      const newVersionFileInput = document.getElementById('newVersionFileInput');
      const newVersionFileInfo = document.getElementById('newVersionFileInfo');
      const newVersionFileName = document.getElementById('newVersionFileName');
      const newVersionFileSize = document.getElementById('newVersionFileSize');
      const clearNewVersionFile = document.getElementById('clearNewVersionFile');
      const cancelCreateVersion = document.getElementById('cancelCreateVersion');
      const confirmCreateVersion = document.getElementById('confirmCreateVersion');
      
      function openVersionModal(id, name) {
        currentDocumentId = id;
        currentDocumentName = name;
        versionModalTitle.textContent = `版本历史 - ${name}`;
        versionModalSubtitle.textContent = `文档 ID: ${id}`;
        selectedVersionIds.clear();
        compareVersionsBtn.disabled = true;
        loadVersions();
        versionModal.classList.add('active');
      }
      
      function closeVersionModalFunc() {
        versionModal.classList.remove('active');
        currentDocumentId = null;
        currentDocumentName = '';
        versions = [];
        selectedVersionIds.clear();
      }
      
      async function loadVersions() {
        if (!currentDocumentId) return;
        
        versionList.innerHTML = `
          <div style="text-align: center; padding: 40px; color: #9ca3af;">
            加载中...
          </div>
        `;
        
        try {
          const result = await apiRequest(`/api/documents/${currentDocumentId}/versions`);
          
          if (result.data && result.data.success) {
            versions = result.data.versions || [];
            renderVersionList();
          } else {
            versionList.innerHTML = `
              <div style="text-align: center; padding: 40px; color: #9ca3af;">
                加载失败: ${result.data?.message || '未知错误'}
              </div>
            `;
          }
        } catch (error) {
          versionList.innerHTML = `
            <div style="text-align: center; padding: 40px; color: #9ca3af;">
              网络错误，请稍后重试
            </div>
          `;
        }
      }
      
      function renderVersionList() {
        if (versions.length === 0) {
          versionList.innerHTML = `
            <div class="empty-state" style="padding: 60px 20px;">
              <div class="empty-state-icon" style="font-size: 48px; margin-bottom: 16px;">📋</div>
              <div class="empty-state-text" style="font-size: 16px; margin-bottom: 8px;">暂无版本历史</div>
              <div class="empty-state-hint" style="font-size: 14px; color: #9ca3af;">点击上方"创建新版本"按钮创建第一个版本</div>
            </div>
          `;
          return;
        }
        
        versionList.innerHTML = versions.map((version, index) => {
          const isSelected = selectedVersionIds.has(version.id);
          const diffStats = version.diff_statistics && typeof version.diff_statistics === 'object' 
            ? version.diff_statistics 
            : (version.diff_statistics ? JSON.parse(version.diff_statistics) : {});
          
          return `
            <div class="version-item ${isSelected ? 'selected' : ''}" data-id="${version.id}" style="
              padding: 16px 20px;
              border-bottom: 1px solid #e2e8f0;
              display: flex;
              gap: 12px;
              align-items: flex-start;
              cursor: pointer;
              transition: background-color 0.2s;
            " onmouseover="this.style.backgroundColor='#f8fafc'" onmouseout="this.style.backgroundColor='transparent'">
              <input type="checkbox" class="version-checkbox" data-id="${version.id}" ${isSelected ? 'checked' : ''} style="
                width: 18px;
                height: 18px;
                margin-top: 4px;
                cursor: pointer;
              ">
              <div style="flex: 1; min-width: 0;">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap;">
                  <span style="
                    font-weight: 600;
                    color: #1e293b;
                    font-size: 14px;
                  ">v${version.version_number}${version.version_label ? ` - ${escapeHtml(version.version_label)}` : ''}</span>
                  <span style="
                    font-size: 12px;
                    color: #64748b;
                  ">${version.uploader?.username || '未知用户'}</span>
                  <span style="
                    font-size: 12px;
                    color: #9ca3af;
                  ">${formatDate(version.created_at)}</span>
                  <span style="
                    font-size: 12px;
                    color: #9ca3af;
                  ">${formatFileSize(version.file_size)}</span>
                </div>
                ${version.change_summary ? `
                  <div style="
                    font-size: 13px;
                    color: #64748b;
                    margin-bottom: 8px;
                    line-height: 1.5;
                  ">${escapeHtml(version.change_summary)}</div>
                ` : ''}
                ${diffStats.lines ? `
                  <div style="
                    display: flex;
                    gap: 16px;
                    font-size: 12px;
                  ">
                    <span style="color: #059669;">+${diffStats.lines.added || 0} 行</span>
                    <span style="color: #dc2626;">-${diffStats.lines.removed || 0} 行</span>
                    ${diffStats.changePercentage ? `<span style="color: #64748b;">变化率: ${diffStats.changePercentage.lines || 0}%</span>` : ''}
                  </div>
                ` : ''}
              </div>
              <div style="display: flex; gap: 8px; flex-shrink: 0;">
                <button class="btn btn-secondary btn-sm restore-version-btn" data-id="${version.id}" data-version="${version.version_number}" title="恢复此版本">
                  <span>↩️</span>
                </button>
                <button class="btn btn-secondary btn-sm download-version-btn" data-id="${version.id}" data-version="${version.version_number}" title="下载此版本">
                  <span>⬇️</span>
                </button>
                ${versions.length > 1 ? `
                  <button class="btn btn-danger btn-sm delete-version-btn" data-id="${version.id}" data-version="${version.version_number}" title="删除此版本">
                    <span>🗑️</span>
                  </button>
                ` : ''}
              </div>
            </div>
          `;
        }).join('');
        
        versionList.querySelectorAll('.version-checkbox').forEach(checkbox => {
          checkbox.addEventListener('change', function(e) {
            e.stopPropagation();
            const id = parseInt(this.dataset.id, 10);
            if (this.checked) {
              selectedVersionIds.add(id);
            } else {
              selectedVersionIds.delete(id);
            }
            compareVersionsBtn.disabled = selectedVersionIds.size !== 2;
            versionList.querySelectorAll('.version-item').forEach(item => {
              const itemId = parseInt(item.dataset.id, 10);
              if (selectedVersionIds.has(itemId)) {
                item.style.backgroundColor = '#eff6ff';
              } else {
                item.style.backgroundColor = 'transparent';
              }
            });
          });
        });
        
        versionList.querySelectorAll('.restore-version-btn').forEach(btn => {
          btn.addEventListener('click', async function(e) {
            e.stopPropagation();
            const id = parseInt(this.dataset.id, 10);
            const versionNum = this.dataset.version;
            
            if (!confirm(`确定要恢复到版本 v${versionNum} 吗？当前文档内容将被替换。`)) {
              return;
            }
            
            try {
              const result = await apiRequest(`/api/documents/versions/${id}/restore`, {
                method: 'POST',
                body: { user_id: AppState.user.id }
              });
              
              if (result.data && result.data.success) {
                showToast(`已恢复到版本 v${versionNum}`, 'success');
                loadVersions();
                loadDocuments();
              } else {
                showToast(result.data?.message || '恢复失败', 'error');
              }
            } catch (error) {
              showToast('网络错误，请稍后重试', 'error');
            }
          });
        });
        
        versionList.querySelectorAll('.download-version-btn').forEach(btn => {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            const id = parseInt(this.dataset.id, 10);
            window.location.href = `/api/documents/versions/${id}/download`;
            showToast('开始下载版本文件', 'info');
          });
        });
        
        versionList.querySelectorAll('.delete-version-btn').forEach(btn => {
          btn.addEventListener('click', async function(e) {
            e.stopPropagation();
            const id = parseInt(this.dataset.id, 10);
            const versionNum = this.dataset.version;
            
            if (!confirm(`确定要删除版本 v${versionNum} 吗？此操作不可恢复。`)) {
              return;
            }
            
            try {
              const result = await apiRequest(`/api/documents/versions/${id}`, {
                method: 'DELETE'
              });
              
              if (result.data && result.data.success) {
                showToast(`已删除版本 v${versionNum}`, 'success');
                loadVersions();
              } else {
                showToast(result.data?.message || '删除失败', 'error');
              }
            } catch (error) {
              showToast('网络错误，请稍后重试', 'error');
            }
          });
        });
      }
      
      function openCreateVersionModal() {
        versionLabel.value = '';
        changeSummary.value = '';
        newVersionFile = null;
        newVersionFileInfo.style.display = 'none';
        newVersionFileInput.value = '';
        createVersionModal.classList.add('active');
      }
      
      function closeCreateVersionModalFunc() {
        createVersionModal.classList.remove('active');
        newVersionFile = null;
      }
      
      async function executeCreateVersion() {
        confirmCreateVersion.disabled = true;
        cancelCreateVersion.disabled = true;
        
        try {
          const body = {
            uploader_id: AppState.user.id,
            version_label: versionLabel.value.trim(),
            change_summary: changeSummary.value.trim()
          };
          
          if (newVersionFile) {
            const fileBase64 = await readFileAsBase64(newVersionFile);
            body.file_base64 = fileBase64.split(',')[1] || fileBase64;
          }
          
          const result = await apiRequest(`/api/documents/${currentDocumentId}/versions`, {
            method: 'POST',
            body
          });
          
          if (result.data && result.data.success) {
            showToast('版本创建成功', 'success');
            closeCreateVersionModalFunc();
            loadVersions();
          } else {
            showToast(result.data?.message || '创建失败', 'error');
            confirmCreateVersion.disabled = false;
            cancelCreateVersion.disabled = false;
          }
        } catch (error) {
          showToast('网络错误，请稍后重试', 'error');
          confirmCreateVersion.disabled = false;
          cancelCreateVersion.disabled = false;
        }
      }
      
      function openCompareView() {
        if (selectedVersionIds.size !== 2) {
          showToast('请选择两个版本进行比对', 'warning');
          return;
        }
        
        const ids = Array.from(selectedVersionIds);
        const diffUrl = `/diff-view.html?document_id=${currentDocumentId}&version_id1=${ids[0]}&version_id2=${ids[1]}`;
        window.open(diffUrl, '_blank');
      }
      
      closeVersionModal.addEventListener('click', closeVersionModalFunc);
      closeVersionModalBtn.addEventListener('click', closeVersionModalFunc);
      
      versionModal.addEventListener('click', (e) => {
        if (e.target === versionModal) {
          closeVersionModalFunc();
        }
      });
      
      createVersionBtn.addEventListener('click', openCreateVersionModal);
      compareVersionsBtn.addEventListener('click', openCompareView);
      refreshVersionsBtn.addEventListener('click', loadVersions);
      
      closeCreateVersionModal.addEventListener('click', closeCreateVersionModalFunc);
      cancelCreateVersion.addEventListener('click', closeCreateVersionModalFunc);
      confirmCreateVersion.addEventListener('click', executeCreateVersion);
      
      createVersionModal.addEventListener('click', (e) => {
        if (e.target === createVersionModal) {
          closeCreateVersionModalFunc();
        }
      });
      
      newVersionUploadArea.addEventListener('click', () => newVersionFileInput.click());
      
      newVersionFileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files.length > 0) {
          newVersionFile = e.target.files[0];
          newVersionFileName.textContent = newVersionFile.name;
          newVersionFileSize.textContent = formatFileSize(newVersionFile.size);
          newVersionFileInfo.style.display = 'block';
        }
      });
      
      clearNewVersionFile.addEventListener('click', () => {
        newVersionFile = null;
        newVersionFileInput.value = '';
        newVersionFileInfo.style.display = 'none';
      });
      
      newVersionUploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        newVersionUploadArea.classList.add('dragover');
      });
      
      newVersionUploadArea.addEventListener('dragleave', () => {
        newVersionUploadArea.classList.remove('dragover');
      });
      
      newVersionUploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        newVersionUploadArea.classList.remove('dragover');
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
          newVersionFile = e.dataTransfer.files[0];
          newVersionFileName.textContent = newVersionFile.name;
          newVersionFileSize.textContent = formatFileSize(newVersionFile.size);
          newVersionFileInfo.style.display = 'block';
        }
      });
      
      loadDocuments();
    });
  </script>
</body>
</html>
